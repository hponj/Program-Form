<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Strategic Financial System - Persistence Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .header-title {
            font-weight: 800;
            letter-spacing: 1px;
            color: #0f172a;
        }

        .category-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .delete-btn {
            color: #cbd5e1;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .progress-bar-custom {
            background: #e2e8f0;
            border-radius: 50px;
            height: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
            height: 100%;
            transition: 0.6s;
        }

        .payday-card {
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body class="container my-4">

    <h2 class="header-title text-center mb-4">FINANCIAL SYSTEM</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-end mb-2">
                <div>
                    <span class="fw-bold text-uppercase small">Passive Income Progress</span>
                    <br><small class="text-muted">Target: Passive Income > Total Expenses</small>
                </div>
                <span id="freedomPct" class="h4 fw-bold text-primary">0%</span>
            </div>
            <div class="progress-bar-custom">
                <div id="freedomBar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">INCOME REPORT</div>
                <div class="card-body">
                    <form id="incomeForm" class="row g-2 mb-3">
                        <div class="col-md-5"><input type="text" id="incDesc" class="form-control form-control-sm"
                                placeholder="Sumber" required></div>
                        <div class="col-md-3">
                            <select id="incCat" class="form-select form-select-sm">
                                <option value="active">Active (Simple IT/Gaji)</option>
                                <option value="dividend">Interest/Dividend</option>
                                <option value="business">Real Estate/Business</option>
                            </select>
                        </div>
                        <div class="col-md-2"><input type="number" id="incVal" class="form-control form-control-sm"
                                placeholder="Rp" required></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
                        </div>
                    </form>

                    <div class="category-label text-dark">Active Income</div>
                    <div id="listActive"></div>
                    <div class="category-label text-primary">Interest / Dividends</div>
                    <div id="listDividend"></div>
                    <div class="category-label text-primary">Real Estate / Business</div>
                    <div id="listBusiness"></div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold text-danger">EXPENSES</div>
                <div class="card-body">
                    <form id="expForm" class="row g-2 mb-3">
                        <div class="col-md-7"><input type="text" id="expDesc" class="form-control form-control-sm"
                                placeholder="Jenis Biaya" required></div>
                        <div class="col-md-3"><input type="number" id="expVal" class="form-control form-control-sm"
                                placeholder="Rp" required></div>
                        <div class="col-md-2"><button type="submit"
                                class="btn btn-outline-danger btn-sm w-100">+</button></div>
                    </form>
                    <div id="listExpense"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card payday-card border-0 shadow">
                <div class="card-body text-center">
                    <div class="small opacity-75 text-uppercase fw-bold">Monthly Payday</div>
                    <div id="paydayVal" class="h2 fw-bold mb-0 text-info">Rp 0</div>
                    <hr class="opacity-25 my-2">
                    <div class="row small opacity-75 text-start">
                        <div class="col-6 text-center border-end border-secondary">Income: <br><span id="totalInc"
                                class="fw-bold">Rp 0</span></div>
                        <div class="col-6 text-center">Expenses: <br><span id="totalExp" class="fw-bold">Rp 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 overflow-hidden">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-2">
                    <span class="fw-bold">Liquid Cash</span>
                    <span class="badge bg-white text-primary" id="totalCashDisplay">Rp 0</span>
                </div>
                <div class="card-body p-0">
                    <form id="cashForm" class="row g-1 p-2 border-bottom">
                        <div class="col-7"><input type="text" id="cName" class="form-control form-control-sm"
                                placeholder="Pos Kas" required></div>
                        <div class="col-3"><input type="number" id="cVal" class="form-control form-control-sm"
                                placeholder="Rp" required></div>
                        <div class="col-2"><button type="submit" class="btn btn-primary btn-sm w-100">+</button></div>
                    </form>
                    <div id="cashList" class="p-2"></div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-success text-white small fw-bold py-1 text-center text-uppercase">
                            Assets</div>
                        <div class="card-body p-2">
                            <form id="assetForm" class="mb-2 border-bottom pb-2">
                                <input type="text" id="astD" class="form-control form-control-sm mb-1"
                                    placeholder="Aset" required>
                                <div class="input-group input-group-sm">
                                    <input type="number" id="astV" class="form-control" placeholder="Nilai" required>
                                    <button type="submit" class="btn btn-success">+</button>
                                </div>
                            </form>
                            <div id="listAsset"></div>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-danger text-white small fw-bold py-1 text-center text-uppercase">
                            Liabilities</div>
                        <div class="card-body p-2">
                            <form id="liabForm" class="mb-2 border-bottom pb-2">
                                <input type="text" id="libD" class="form-control form-control-sm mb-1"
                                    placeholder="Hutang" required>
                                <div class="input-group input-group-sm">
                                    <input type="number" id="libV" class="form-control" placeholder="Nilai" required>
                                    <button type="submit" class="btn btn-danger">+</button>
                                </div>
                            </form>
                            <div id="listLiab"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kunci penyimpanan tetap
        const STORAGE_KEY = 'STRATEGIC_FIN_DATA_V3';

        // Inisialisasi Data
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            inc: [], exp: [], ast: [], lib: [], cash: []
        };

        function saveAndRender() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            render();
        }

        // --- FORM HANDLERS ---
        document.getElementById('incomeForm').onsubmit = (e) => {
            e.preventDefault();
            db.inc.push({
                d: document.getElementById('incDesc').value,
                c: document.getElementById('incCat').value,
                v: parseFloat(document.getElementById('incVal').value)
            });
            e.target.reset(); saveAndRender();
        };

        document.getElementById('expForm').onsubmit = (e) => {
            e.preventDefault();
            db.exp.push({
                d: document.getElementById('expDesc').value,
                v: parseFloat(document.getElementById('expVal').value)
            });
            e.target.reset(); saveAndRender();
        };

        document.getElementById('cashForm').onsubmit = (e) => {
            e.preventDefault();
            db.cash.push({
                d: document.getElementById('cName').value,
                v: parseFloat(document.getElementById('cVal').value)
            });
            e.target.reset(); saveAndRender();
        };

        document.getElementById('assetForm').onsubmit = (e) => {
            e.preventDefault();
            db.ast.push({
                d: document.getElementById('astD').value,
                v: parseFloat(document.getElementById('astV').value)
            });
            e.target.reset(); saveAndRender();
        };

        document.getElementById('liabForm').onsubmit = (e) => {
            e.preventDefault();
            db.lib.push({
                d: document.getElementById('libD').value,
                v: parseFloat(document.getElementById('libV').value)
            });
            e.target.reset(); saveAndRender();
        };

        // --- ACTIONS ---
        window.del = (type, i) => { db[type].splice(i, 1); saveAndRender(); };
        window.adjCash = (i, s) => {
            const val = parseFloat(prompt("Masukkan Nominal:"));
            if (!isNaN(val)) { db.cash[i].v += (val * s); saveAndRender(); }
        };

        // --- RENDER ENGINE ---
        function render() {
            let tInc = 0, tExp = 0, pInc = 0, tCash = 0;
            const cats = { active: 'listActive', dividend: 'listDividend', business: 'listBusiness' };

            // Reset DOM
            Object.values(cats).forEach(id => document.getElementById(id).innerHTML = '');
            ['listExpense', 'cashList', 'listAsset', 'listLiab'].forEach(id => document.getElementById(id).innerHTML = '');

            // Render Income
            db.inc.forEach((item, i) => {
                tInc += item.v;
                if (item.c !== 'active') pInc += item.v;
                document.getElementById(cats[item.c]).innerHTML += `
                <div class="d-flex justify-content-between small border-bottom py-1">
                    <span>${item.d}</span>
                    <span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('inc', ${i})">×</a></span>
                </div>`;
            });

            // Render Expense
            db.exp.forEach((item, i) => {
                tExp += item.v;
                document.getElementById('listExpense').innerHTML += `
                <div class="d-flex justify-content-between small border-bottom py-1 text-danger">
                    <span>${item.d}</span>
                    <span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('exp', ${i})">×</a></span>
                </div>`;
            });

            // Render Cash
            db.cash.forEach((item, i) => {
                tCash += item.v;
                document.getElementById('cashList').innerHTML += `
                <div class="d-flex justify-content-between align-items-center small border-bottom py-1">
                    <div><b>${item.d}</b><br>Rp ${item.v.toLocaleString()}</div>
                    <div>
                        <button class="btn btn-sm p-0 px-1 btn-outline-success" onclick="adjCash(${i}, 1)">+</button> 
                        <button class="btn btn-sm p-0 px-1 btn-outline-danger" onclick="adjCash(${i}, -1)">-</button> 
                        <a class="delete-btn ms-1" onclick="del('cash', ${i})">×</a>
                    </div>
                </div>`;
            });

            // Render Assets & Liab
            const drawList = (data, id, type) => data.forEach((item, i) => {
                document.getElementById(id).innerHTML += `
                <div class="small border-bottom py-1">
                    <b>${item.d}</b><br>Rp ${item.v.toLocaleString()} 
                    <a class="delete-btn float-end" onclick="del('${type}', ${i})">×</a>
                </div>`;
            });
            drawList(db.ast, 'listAsset', 'ast');
            drawList(db.lib, 'listLiab', 'lib');

            // Update Stats
            document.getElementById('totalInc').textContent = `Rp ${tInc.toLocaleString()}`;
            document.getElementById('totalExp').textContent = `Rp ${tExp.toLocaleString()}`;
            document.getElementById('paydayVal').textContent = `Rp ${(tInc - tExp).toLocaleString()}`;
            document.getElementById('totalCashDisplay').textContent = `Total: Rp ${tCash.toLocaleString()}`;

            // Progress Logic
            const progress = tExp > 0 ? (pInc / tExp) * 100 : 0;
            document.getElementById('freedomBar').style.width = Math.min(progress, 100) + '%';
            document.getElementById('freedomPct').textContent = Math.round(progress) + '%';
        }

        // Initial Render
        render();
    </script>
</body>

</html>
