<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financial & Activity Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .delete-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #dc3545; }
    .check-table td { width: 14.2%; height: 90px; vertical-align: middle; }
    .check-table input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
    .card { margin-bottom: 1.5rem; border-radius: 10px; overflow: hidden; }
    .monthly-check-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
    .total-cash { font-size: 1.4rem; font-weight: bold; color: #198754; }
    .input-adjust { width: 100px !important; display: inline-block; }
  </style>
</head>
<body class="container my-4">

  <h2 class="mb-4">Financial & Activity Tracker</h2>

  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <span class="fw-bold">Catatan Keuangan</span>
        <span class="badge bg-light text-dark p-2" id="totalCashDisplay" style="font-size: 1rem;">Total: Rp 0</span>
    </div>
    <div class="card-body">
      <form id="financeForm" class="row g-2 mb-4">
        <div class="col-md-5">
          <input type="text" id="namaPos" class="form-control" placeholder="Nama Pos (misal: Uang Jajan)" required>
        </div>
        <div class="col-md-4">
          <input type="number" id="nominalAwal" class="form-control" placeholder="Nominal Awal" required>
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-primary w-100">Tambah Pos</button>
        </div>
      </form>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Keterangan</th>
              <th>Saldo</th>
              <th class="text-center" style="width: 300px;">Update Saldo</th>
              <th class="text-center">Hapus</th>
            </tr>
          </thead>
          <tbody id="financeTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-success text-white fw-bold">Portofolio Saham</div>
    <div class="card-body">
      <form id="stockForm" class="row g-2 mb-4">
        <div class="col-md-5">
          <input type="text" id="kodeSaham" class="form-control" placeholder="Kode Saham (misal: ASII)" required>
        </div>
        <div class="col-md-4">
          <input type="number" id="jumlahLot" class="form-control" placeholder="Jumlah Lot Awal" required>
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-success w-100">Tambah Saham</button>
        </div>
      </form>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Kode</th>
              <th>Total Lot</th>
              <th class="text-center" style="width: 300px;">Update Lot</th>
              <th class="text-center">Hapus</th>
            </tr>
          </thead>
          <tbody id="stockTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
      <div>
        <button id="prevMonth" class="btn btn-sm btn-light me-2">‹</button>
        <button id="nextMonth" class="btn btn-sm btn-light">›</button>
      </div>
      <span id="monthTitle" class="fw-bold"></span>
      <button id="resetChecklist" class="btn btn-sm btn-outline-light">Reset</button>
    </div>
    <div class="card-body">
      <h3 class="monthly-check-title text-primary">Cahaya Sakti Pratama:</h3>
      <div class="table-responsive mb-4">
        <table class="table table-bordered text-center align-middle check-table">
          <thead class="table-light">
            <tr><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th><th>Min</th></tr>
          </thead>
          <tbody id="checkBulanBodyCSP"></tbody>
        </table>
      </div>

      <h3 class="monthly-check-title text-success">Dhimasmitrainternational:</h3>
      <div class="table-responsive">
        <table class="table table-bordered text-center align-middle check-table">
          <thead class="table-light">
            <tr><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th><th>Min</th></tr>
          </thead>
          <tbody id="checkBulanBodyDMI"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let finances = JSON.parse(localStorage.getItem('finances')) || [];
    let stocks = JSON.parse(localStorage.getItem('stocks')) || [];
    let currentDate = new Date();

    // === Fungsi Keuangan ===
    document.getElementById('financeForm').onsubmit = function(e) {
      e.preventDefault();
      finances.push({ 
        nama: document.getElementById('namaPos').value, 
        saldo: parseFloat(document.getElementById('nominalAwal').value) 
      });
      updateFinance();
      this.reset();
    };

    function updateFinance() {
      localStorage.setItem('finances', JSON.stringify(finances));
      const tbody = document.getElementById('financeTableBody');
      tbody.innerHTML = '';
      let total = 0;

      finances.forEach((item, index) => {
        total += item.saldo;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${item.nama}</strong></td>
          <td>Rp ${item.saldo.toLocaleString('id-ID')}</td>
          <td class="text-center">
            <div class="input-group input-group-sm justify-content-center">
              <input type="number" class="form-control input-adjust" id="adjFin-${index}" placeholder="Nilai">
              <button class="btn btn-outline-success" onclick="changeFinance(${index}, 1)">+</button>
              <button class="btn btn-outline-danger" onclick="changeFinance(${index}, -1)">-</button>
            </div>
          </td>
          <td class="text-center"><button class="delete-btn" onclick="deleteFinance(${index})">×</button></td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('totalCashDisplay').textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
    }

    window.changeFinance = (index, sign) => {
      const input = document.getElementById(`adjFin-${index}`);
      const val = parseFloat(input.value);
      if(!isNaN(val)) {
        finances[index].saldo += (val * sign);
        updateFinance();
      }
    };

    window.deleteFinance = (index) => { finances.splice(index, 1); updateFinance(); };

    // === Fungsi Saham ===
    document.getElementById('stockForm').onsubmit = function(e) {
      e.preventDefault();
      stocks.push({ 
        kode: document.getElementById('kodeSaham').value.toUpperCase(), 
        lot: parseInt(document.getElementById('jumlahLot').value) 
      });
      updateStocks();
      this.reset();
    };

    function updateStocks() {
      localStorage.setItem('stocks', JSON.stringify(stocks));
      const tbody = document.getElementById('stockTableBody');
      tbody.innerHTML = '';
      stocks.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${item.kode}</strong></td>
          <td>${item.lot} Lot</td>
          <td class="text-center">
            <div class="input-group input-group-sm justify-content-center">
              <input type="number" class="form-control input-adjust" id="adjStock-${index}" placeholder="Lot">
              <button class="btn btn-outline-success" onclick="changeStock(${index}, 1)">+</button>
              <button class="btn btn-outline-danger" onclick="changeStock(${index}, -1)">-</button>
            </div>
          </td>
          <td class="text-center"><button class="delete-btn" onclick="deleteStock(${index})">×</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.changeStock = (index, sign) => {
      const input = document.getElementById(`adjStock-${index}`);
      const val = parseInt(input.value);
      if(!isNaN(val)) {
        stocks[index].lot += (val * sign);
        updateStocks();
      }
    };

    window.deleteStock = (index) => { stocks.splice(index, 1); updateStocks(); };

    // === Fungsi Checklist Bulanan ===
    function createChecklistTable(tbodyId, storagePrefix) {
      const tbody = document.getElementById(tbodyId);
      tbody.innerHTML = '';
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const storageKey = `${storagePrefix}-${year}-${month + 1}`;
      let monthlyChecks = JSON.parse(localStorage.getItem(storageKey)) || {};

      let tr = document.createElement('tr');
      for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) tr.appendChild(document.createElement('td'));

      for (let day = 1; day <= daysInMonth; day++) {
        const td = document.createElement('td');
        td.innerHTML = `<div><div class="fw-bold">${day}</div><input type="checkbox" class="form-check-input check-day" data-day="${day}" data-storage="${storageKey}" ${monthlyChecks[day] ? 'checked' : ''}></div>`;
        tr.appendChild(td);
        if (new Date(year, month, day).getDay() === 0) { tbody.appendChild(tr); tr = document.createElement('tr'); }
      }
      if (tr.children.length > 0) tbody.appendChild(tr);
    }

    function renderCheckBulanan() {
      const monthName = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
      document.getElementById('monthTitle').textContent = monthName;
      createChecklistTable('checkBulanBodyCSP', 'checklist-csp');
      createChecklistTable('checkBulanBodyDMI', 'checklist-dmi');
      document.querySelectorAll('.check-day').forEach(cb => {
        cb.onchange = () => {
          let data = JSON.parse(localStorage.getItem(cb.dataset.storage)) || {};
          data[cb.dataset.day] = cb.checked;
          localStorage.setItem(cb.dataset.storage, JSON.stringify(data));
        };
      });
    }

    document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCheckBulanan(); };
    document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCheckBulanan(); };
    document.getElementById('resetChecklist').onclick = () => {
      if (confirm('Reset checklist?')) {
        localStorage.removeItem(`checklist-csp-${currentDate.getFullYear()}-${currentDate.getMonth()+1}`);
        localStorage.removeItem(`checklist-dmi-${currentDate.getFullYear()}-${currentDate.getMonth()+1}`);
        renderCheckBulanan();
      }
    };

    updateFinance(); updateStocks(); renderCheckBulanan();
  </script>
</body>
</html>
