<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elite Financial Tracker - Cashflow Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --income-bg: #f0fdf4;
            --income-text: #166534;
            --expense-bg: #fef2f2;
            --expense-text: #991b1b;
            --asset-bg: #eff6ff;
            --asset-text: #1e40af;
            --liability-bg: #fff7ed;
            --liability-text: #9a3412;
        }

        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #cbd5e1;
            transition: 0.2s;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .freedom-bar {
            height: 12px;
            border-radius: 10px;
            background-color: #e2e8f0;
            overflow: hidden;
        }

        .bg-income {
            background: var(--income-bg);
            color: var(--income-text);
            padding: 20px;
            border-radius: 12px;
        }

        .bg-expense {
            background: var(--expense-bg);
            color: var(--expense-text);
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body class="container my-4">

    <h2 class="mb-4 fw-bold text-center">STRATEGIC FINANCIAL STATEMENT</h2>

    <div class="card mb-4 bg-dark text-white">
        <div class="card-body p-4">
            <div class="row align-items-center text-center">
                <div class="col-md-4">
                    <small class="text-secondary">Passive Income</small>
                    <h3 class="fw-bold text-success" id="dashPassive">Rp 0</h3>
                </div>
                <div class="col-md-4">
                    <small class="text-secondary">Total Expenses</small>
                    <h3 class="fw-bold text-danger" id="dashExpense">Rp 0</h3>
                </div>
                <div class="col-md-4">
                    <small class="text-secondary text-uppercase fw-bold">Financial Freedom Progress</small>
                    <div class="freedom-bar mt-2">
                        <div id="freedomProgress" class="progress-bar bg-success" style="width: 0%"></div>
                    </div>
                    <small id="freedomStatus" class="mt-1 d-block text-info">Rat Race Status</small>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-white d-flex justify-content-between fw-bold">
            REPORT: <span id="currentMonthText">MEI 2026</span>
        </div>
        <div class="card-body">
            <form id="cashFlowForm" class="row g-2 mb-4 p-3 bg-light rounded">
                <div class="col-md-4"><input type="text" id="cfDesc" class="form-control"
                        placeholder="Sumber/Keterangan" required></div>
                <div class="col-md-2">
                    <select id="cfCat" class="form-select">
                        <option value="active">Active Inc</option>
                        <option value="passive">Passive Inc</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="col-md-3"><input type="number" id="cfAmount" class="form-control" placeholder="Nominal Rp"
                        required></div>
                <div class="col-md-3"><button type="submit" class="btn btn-primary w-100 fw-bold">CATAT
                        TRANSAKSI</button></div>
            </form>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="bg-income">
                        <div class="section-title">Income (Passive & Active)</div>
                        <div id="incomeList" style="max-height: 250px; overflow-y: auto;"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="bg-expense">
                        <div class="section-title">Total Expenses</div>
                        <div id="expenseList" style="max-height: 250px; overflow-y: auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-white fw-bold">ASSETS & PORTFOLIO</div>
                <div class="card-body">
                    <form id="assetForm" class="row g-2 mb-3">
                        <div class="col-6"><input type="text" id="assetName" class="form-control form-control-sm"
                                placeholder="Nama Aset (Saham/Alat)"></div>
                        <div class="col-4"><input type="number" id="assetVal" class="form-control form-control-sm"
                                placeholder="Nilai/Cost"></div>
                        <div class="col-2"><button type="submit" class="btn btn-dark btn-sm w-100">+</button></div>
                    </form>
                    <div id="assetList" class="list-group list-group-flush"></div>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card h-100 shadow-sm border-danger">
                <div class="card-header bg-white fw-bold text-danger">LIABILITIES (HUTANG)</div>
                <div class="card-body">
                    <form id="liabForm" class="row g-2 mb-3">
                        <div class="col-7"><input type="text" id="liabName" class="form-control form-control-sm"
                                placeholder="Hutang"></div>
                        <div class="col-3"><input type="number" id="liabVal" class="form-control form-control-sm"
                                placeholder="Rp"></div>
                        <div class="col-2"><button type="submit" class="btn btn-outline-danger btn-sm w-100">+</button>
                        </div>
                    </form>
                    <div id="liabList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cfData = JSON.parse(localStorage.getItem('cf_data')) || [];
        let assetData = JSON.parse(localStorage.getItem('asset_data')) || [];
        let liabData = JSON.parse(localStorage.getItem('liab_data')) || [];

        // FORM HANDLERS
        document.getElementById('cashFlowForm').onsubmit = function (e) {
            e.preventDefault();
            cfData.push({ desc: document.getElementById('cfDesc').value, cat: document.getElementById('cfCat').value, amount: parseFloat(document.getElementById('cfAmount').value) });
            updateUI(); this.reset();
        };

        document.getElementById('assetForm').onsubmit = function (e) {
            e.preventDefault();
            assetData.push({ name: document.getElementById('assetName').value, val: parseFloat(document.getElementById('assetVal').value) });
            updateUI(); this.reset();
        };

        document.getElementById('liabForm').onsubmit = function (e) {
            e.preventDefault();
            liabData.push({ name: document.getElementById('liabName').value, val: parseFloat(document.getElementById('liabVal').value) });
            updateUI(); this.reset();
        };

        function updateUI() {
            localStorage.setItem('cf_data', JSON.stringify(cfData));
            localStorage.setItem('asset_data', JSON.stringify(assetData));
            localStorage.setItem('liab_data', JSON.stringify(liabData));

            let passInc = 0, actInc = 0, totalExp = 0;

            const incList = document.getElementById('incomeList');
            const expList = document.getElementById('expenseList');
            incList.innerHTML = ''; expList.innerHTML = '';

            cfData.forEach((item, index) => {
                const div = `<div class="d-flex justify-content-between border-bottom py-1 small">
          <span>${item.desc} ${item.cat === 'passive' ? '🔄' : ''}</span>
          <span class="fw-bold">Rp ${item.amount.toLocaleString('id-ID')} 
          <button class="delete-btn" onclick="deleteItem('cf', ${index})">×</button></span>
        </div>`;
                if (item.cat === 'expense') { totalExp += item.amount; expList.innerHTML += div; }
                else {
                    if (item.cat === 'passive') passInc += item.amount; else actInc += item.amount;
                    incList.innerHTML += div;
                }
            });

            // Update Dashboard
            document.getElementById('dashPassive').textContent = `Rp ${passInc.toLocaleString('id-ID')}`;
            document.getElementById('dashExpense').textContent = `Rp ${totalExp.toLocaleString('id-ID')}`;

            const progress = totalExp > 0 ? (passInc / totalExp) * 100 : 0;
            document.getElementById('freedomProgress').style.width = Math.min(progress, 100) + '%';
            document.getElementById('freedomStatus').textContent = progress >= 100 ? "OUT OF THE RAT RACE! 🎉" : "RAT RACE MODE 🏃‍♂️";

            // Update Assets
            const aList = document.getElementById('assetList'); aList.innerHTML = '';
            assetData.forEach((item, index) => {
                aList.innerHTML += `<div class="list-group-item d-flex justify-content-between p-2 small">
            ${item.name} <span class="fw-bold">Rp ${item.val.toLocaleString('id-ID')} 
            <button class="delete-btn" onclick="deleteItem('asset', ${index})">×</button></span>
        </div>`;
            });

            // Update Liabilities
            const lList = document.getElementById('liabList'); lList.innerHTML = '';
            liabData.forEach((item, index) => {
                lList.innerHTML += `<div class="d-flex justify-content-between border-bottom p-2 small">
            ${item.name} <span class="text-danger fw-bold">Rp ${item.val.toLocaleString('id-ID')} 
            <button class="delete-btn" onclick="deleteItem('liab', ${index})">×</button></span>
        </div>`;
            });
        }

        window.deleteItem = (type, index) => {
            if (type === 'cf') cfData.splice(index, 1);
            else if (type === 'asset') assetData.splice(index, 1);
            else liabData.splice(index, 1);
            updateUI();
        };

        updateUI();
    </script>
</body>

</html>
