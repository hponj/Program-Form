<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Strategic Financial System - Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .header-title {
            font-weight: 800;
            letter-spacing: 1px;
            color: #0f172a;
        }

        .category-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .delete-btn {
            color: #cbd5e1;
            cursor: pointer;
            text-decoration: none;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .progress-bar-custom {
            background: #e2e8f0;
            border-radius: 50px;
            height: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
            height: 100%;
            transition: 0.6s;
        }

        .payday-card {
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body class="container my-4">

    <h2 class="header-title text-center mb-4">FINANCIAL SYSTEM</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-end mb-2">
                <div>
                    <span class="fw-bold">PASSIVE INCOME PROGRESS</span>
                    <br><small class="text-muted">Target: Passive Income > Total Expenses</small>
                </div>
                <span id="freedomPct" class="h4 fw-bold text-primary">0%</span>
            </div>
            <div class="progress-bar-custom">
                <div id="freedomBar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">INCOME REPORT</div>
                <div class="card-body">
                    <form id="incomeForm" class="row g-2 mb-3">
                        <div class="col-md-5"><input type="text" class="form-control form-control-sm"
                                placeholder="Sumber" required></div>
                        <div class="col-md-3">
                            <select class="form-select form-select-sm">
                                <option value="active">Active (Simple IT/Gaji)</option>
                                <option value="dividend">Interest/Dividend</option>
                                <option value="business">Real Estate/Business</option>
                            </select>
                        </div>
                        <div class="col-md-2"><input type="number" class="form-control form-control-sm" placeholder="Rp"
                                required></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
                        </div>
                    </form>

                    <div class="category-label text-dark">Active Income</div>
                    <div id="listActive"></div>
                    <div class="category-label text-primary">Interest / Dividends</div>
                    <div id="listDividend"></div>
                    <div class="category-label text-primary">Real Estate / Business</div>
                    <div id="listBusiness"></div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold text-danger">EXPENSES</div>
                <div class="card-body">
                    <form id="expForm" class="row g-2 mb-3">
                        <div class="col-md-7"><input type="text" class="form-control form-control-sm"
                                placeholder="Jenis Biaya" required></div>
                        <div class="col-md-3"><input type="number" class="form-control form-control-sm" placeholder="Rp"
                                required></div>
                        <div class="col-md-2"><button type="submit"
                                class="btn btn-outline-danger btn-sm w-100">+</button></div>
                    </form>
                    <div id="listExpense"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card payday-card border-0 shadow">
                <div class="card-body text-center">
                    <div class="small opacity-75">MONTHLY PAYDAY</div>
                    <div id="paydayVal" class="h2 fw-bold mb-0 text-info">Rp 0</div>
                    <hr class="opacity-25 my-2">
                    <div class="row small opacity-75 text-start">
                        <div class="col-6 text-center border-end border-secondary">Income: <br><span id="totalInc"
                                class="fw-bold">Rp 0</span></div>
                        <div class="col-6 text-center">Expenses: <br><span id="totalExp" class="fw-bold">Rp 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 overflow-hidden">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Liquid Cash</span>
                    <span class="badge bg-white text-primary" id="totalCashDisplay">Rp 0</span>
                </div>
                <div class="card-body p-0">
                    <form id="cashForm" class="row g-1 p-2 border-bottom">
                        <div class="col-7"><input type="text" class="form-control form-control-sm" placeholder="Pos Kas"
                                required></div>
                        <div class="col-3"><input type="number" class="form-control form-control-sm"
                                placeholder="Nominal" required></div>
                        <div class="col-2"><button type="submit" class="btn btn-primary btn-sm w-100">+</button></div>
                    </form>
                    <div id="cashList" class="p-2"></div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white small fw-bold">ASSETS</div>
                        <div class="card-body p-2">
                            <form id="assetForm" class="row g-1 mb-2">
                                <div class="col-8"><input type="text" class="form-control form-control-sm px-1"
                                        placeholder="Aset"></div>
                                <div class="col-4"><button type="submit" class="btn btn-success btn-sm w-100">+</button>
                                </div>
                                <div class="col-12 mt-1"><input type="number" class="form-control form-control-sm"
                                        placeholder="Nilai Aset"></div>
                            </form>
                            <div id="listAsset"></div>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-danger text-white small fw-bold">LIABILITIES</div>
                        <div class="card-body p-2">
                            <form id="liabForm" class="row g-1 mb-2">
                                <div class="col-8"><input type="text" class="form-control form-control-sm px-1"
                                        placeholder="Hutang"></div>
                                <div class="col-4"><button type="submit" class="btn btn-danger btn-sm w-100">+</button>
                                </div>
                                <div class="col-12 mt-1"><input type="number" class="form-control form-control-sm"
                                        placeholder="Nominal"></div>
                            </form>
                            <div id="listLiab"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fin_v_final_fixed')) || { inc: [], exp: [], ast: [], lib: [], cash: [] };

        function save() { localStorage.setItem('fin_v_final_fixed', JSON.stringify(db)); render(); }

        // Forms handling
        document.getElementById('incomeForm').onsubmit = (e) => {
            e.preventDefault();
            db.inc.push({ d: e.target[0].value, c: e.target[1].value, v: parseFloat(e.target[2].value) });
            save(); e.target.reset();
        };
        document.getElementById('expForm').onsubmit = (e) => {
            e.preventDefault();
            db.exp.push({ d: e.target[0].value, v: parseFloat(e.target[1].value) });
            save(); e.target.reset();
        };
        document.getElementById('cashForm').onsubmit = (e) => {
            e.preventDefault();
            db.cash.push({ d: e.target[0].value, v: parseFloat(e.target[1].value) });
            save(); e.target.reset();
        };
        document.getElementById('assetForm').onsubmit = (e) => {
            e.preventDefault();
            db.ast.push({ d: e.target[0].value, v: parseFloat(e.target[2].value) });
            save(); e.target.reset();
        };
        document.getElementById('liabForm').onsubmit = (e) => {
            e.preventDefault();
            db.lib.push({ d: e.target[0].value, v: parseFloat(e.target[2].value) });
            save(); e.target.reset();
        };

        window.del = (type, i) => { db[type].splice(i, 1); save(); };
        window.adjCash = (i, s) => { const v = parseFloat(prompt("Nominal:")); if (!isNaN(v)) { db.cash[i].v += (v * s); save(); } };

        function render() {
            let tInc = 0, tExp = 0, pInc = 0, tCash = 0;
            const cats = { active: 'listActive', dividend: 'listDividend', business: 'listBusiness' };

            // Clear all
            Object.values(cats).forEach(id => document.getElementById(id).innerHTML = '');
            ['listExpense', 'cashList', 'listAsset', 'listLiab'].forEach(id => document.getElementById(id).innerHTML = '');

            // Income & Passive Progress
            db.inc.forEach((item, i) => {
                tInc += item.v; if (item.c !== 'active') pInc += item.v;
                document.getElementById(cats[item.c]).innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('inc', ${i})">×</a></span></div>`;
            });

            // Expense
            db.exp.forEach((item, i) => {
                tExp += item.v;
                document.getElementById('listExpense').innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1 text-danger"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('exp', ${i})">×</a></span></div>`;
            });

            // Cash Table
            db.cash.forEach((item, i) => {
                tCash += item.v;
                document.getElementById('cashList').innerHTML += `<div class="d-flex justify-content-between align-items-center small border-bottom py-1">
          <div><b>${item.d}</b><br>Rp ${item.v.toLocaleString()}</div>
          <div><button class="btn btn-sm p-0 px-1 btn-outline-success" onclick="adjCash(${i},1)">+</button> <button class="btn btn-sm p-0 px-1 btn-outline-danger" onclick="adjCash(${i},-1)">-</button> <a class="delete-btn ms-1" onclick="del('cash', ${i})">×</a></div>
        </div>`;
            });

            // Assets & Liabilities (Corrected)
            const drawBox = (data, id, type) => data.forEach((item, i) => {
                document.getElementById(id).innerHTML += `<div class="small border-bottom py-1"><b>${item.d}</b><br>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('${type}', ${i})">×</a></div>`;
            });
            drawBox(db.ast, 'listAsset', 'ast'); drawBox(db.lib, 'listLiab', 'lib');

            // Update UI
            document.getElementById('totalInc').textContent = `Rp ${tInc.toLocaleString()}`;
            document.getElementById('totalExp').textContent = `Rp ${tExp.toLocaleString()}`;
            document.getElementById('paydayVal').textContent = `Rp ${(tInc - tExp).toLocaleString()}`;
            document.getElementById('totalCashDisplay').textContent = `Rp ${tCash.toLocaleString()}`;

            const prog = tExp > 0 ? (pInc / tExp) * 100 : 0;
            document.getElementById('freedomBar').style.width = Math.min(prog, 100) + '%';
            document.getElementById('freedomPct').textContent = Math.round(prog) + '%';
        }
        render();
    </script>
</body>

</html>
