<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Strategic Financial System - Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1rem;
        }

        .header-bar {
            background: #1e293b;
            color: white;
            padding: 10px 15px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .delete-btn {
            color: #cbd5e1;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .progress-container {
            background: #e2e8f0;
            border-radius: 50px;
            height: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            height: 100%;
            transition: 0.6s;
        }

        .category-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>

<body class="container my-4">

    <div class="card mb-4">
        <div class="card-body py-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="fw-bold small">PASSIVE INCOME PROGRESS</span>
                <span id="freedomPct" class="fw-bold text-primary">0%</span>
            </div>
            <div class="progress-container">
                <div id="freedomBar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-7">
            <div class="card">
                <div class="header-bar">Income Report</div>
                <div class="card-body">
                    <form id="incForm" class="row g-1 mb-3">
                        <div class="col-5"><input type="text" class="form-control form-control-sm" placeholder="Sumber"
                                required></div>
                        <div class="col-3">
                            <select class="form-select form-select-sm">
                                <option value="active">Active</option>
                                <option value="dividend">Dividend</option>
                                <option value="business">Business</option>
                            </select>
                        </div>
                        <div class="col-2"><input type="number" class="form-control form-control-sm" placeholder="Rp"
                                required></div>
                        <div class="col-2"><button type="submit" class="btn btn-primary btn-sm w-100">+</button></div>
                    </form>
                    <div class="category-label text-dark">Active Income</div>
                    <div id="listActive"></div>
                    <div class="category-label text-primary">Interest / Dividend</div>
                    <div id="listDividend"></div>
                    <div class="category-label text-primary">Business / Real Estate</div>
                    <div id="listBusiness"></div>
                </div>
            </div>

            <div class="card">
                <div class="header-bar bg-danger">Expenses</div>
                <div class="card-body">
                    <form id="expForm" class="row g-1 mb-3">
                        <div class="col-7"><input type="text" class="form-control form-control-sm"
                                placeholder="Keterangan" required></div>
                        <div class="col-3"><input type="number" class="form-control form-control-sm" placeholder="Rp"
                                required></div>
                        <div class="col-2"><button type="submit" class="btn btn-danger btn-sm w-100">+</button></div>
                    </form>
                    <div id="listExpense"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card bg-dark text-white shadow-sm">
                <div class="card-body text-center py-3">
                    <div class="small opacity-75 text-uppercase">Monthly Payday</div>
                    <div id="paydayVal" class="h2 fw-bold mb-0 text-info">Rp 0</div>
                </div>
            </div>

            <div class="card">
                <div class="header-bar bg-primary d-flex justify-content-between">
                    <span>Liquid Cash</span>
                    <span id="totalCashDisplay">Total: Rp 0</span>
                </div>
                <div class="card-body p-0">
                    <form id="cashForm" class="row g-1 p-2 border-bottom">
                        <div class="col-6"><input type="text" class="form-control form-control-sm" placeholder="Pos"
                                required></div>
                        <div class="col-4"><input type="number" class="form-control form-control-sm"
                                placeholder="Nominal" required></div>
                        <div class="col-2"><button type="submit" class="btn btn-primary btn-sm w-100">+</button></div>
                    </form>
                    <div id="cashTableBody"></div>
                </div>
            </div>

            <div class="card">
                <div class="header-bar bg-success">Assets (Market Value)</div>
                <div class="card-body p-0">
                    <form id="astForm" class="row g-1 p-2 border-bottom">
                        <div class="col-6"><input type="text" class="form-control form-control-sm"
                                placeholder="Nama Aset" required></div>
                        <div class="col-4"><input type="number" class="form-control form-control-sm" placeholder="Harga"
                                required></div>
                        <div class="col-2"><button type="submit" class="btn btn-success btn-sm w-100">+</button></div>
                    </form>
                    <div id="listAsset"></div>
                </div>
            </div>

            <div class="card">
                <div class="header-bar bg-secondary">Liabilities (Debts)</div>
                <div class="card-body p-0">
                    <form id="libForm" class="row g-1 p-2 border-bottom">
                        <div class="col-6"><input type="text" class="form-control form-control-sm" placeholder="Hutang"
                                required></div>
                        <div class="col-4"><input type="number" class="form-control form-control-sm" placeholder="Sisa"
                                required></div>
                        <div class="col-2"><button type="submit" class="btn btn-secondary btn-sm w-100">+</button></div>
                    </form>
                    <div id="listLiab"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fin_v_fixed')) || { inc: [], exp: [], ast: [], lib: [], cash: [] };

        function save() { localStorage.setItem('fin_v_fixed', JSON.stringify(db)); render(); }

        const setupForm = (id, key, isInc = false) => {
            document.getElementById(id).onsubmit = (e) => {
                e.preventDefault();
                const entry = { d: e.target[0].value, v: parseFloat(e.target[isInc ? 2 : 1].value) };
                if (isInc) entry.c = e.target[1].value;
                db[key].push(entry);
                save(); e.target.reset();
            };
        };

        setupForm('incForm', 'inc', true); setupForm('expForm', 'exp');
        setupForm('cashForm', 'cash'); setupForm('astForm', 'ast'); setupForm('libForm', 'lib');

        window.del = (k, i) => { db[k].splice(i, 1); save(); };
        window.adjCash = (i, s) => { const val = parseFloat(prompt("Masukkan nominal:")); if (!isNaN(val)) { db.cash[i].v += (val * s); save(); } };

        function render() {
            let tI = 0, tE = 0, pI = 0, tC = 0;
            const ids = { active: 'listActive', dividend: 'listDividend', business: 'listBusiness' };

            // Clear All
            Object.values(ids).forEach(id => document.getElementById(id).innerHTML = '');
            ['listExpense', 'cashTableBody', 'listAsset', 'listLiab'].forEach(id => document.getElementById(id).innerHTML = '');

            // Income & Expenses
            db.inc.forEach((item, i) => {
                tI += item.v; if (item.c !== 'active') pI += item.v;
                document.getElementById(ids[item.c]).innerHTML += `<div class="d-flex justify-content-between border-bottom py-1 px-2"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('inc', ${i})">×</a></span></div>`;
            });
            db.exp.forEach((item, i) => {
                tE += item.v;
                document.getElementById('listExpense').innerHTML += `<div class="d-flex justify-content-between border-bottom py-1 px-2 text-danger"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('exp', ${i})">×</a></span></div>`;
            });

            // Liquid Cash Table
            db.cash.forEach((item, i) => {
                tC += item.v;
                document.getElementById('cashTableBody').innerHTML += `<div class="d-flex justify-content-between align-items-center border-bottom py-1 px-2"><div><strong>${item.d}</strong><br><small>Rp ${item.v.toLocaleString()}</small></div><div><button class="btn btn-outline-success btn-xs" style="padding: 0px 5px;" onclick="adjCash(${i}, 1)">+</button> <button class="btn btn-outline-danger btn-xs" style="padding: 0px 5px;" onclick="adjCash(${i}, -1)">-</button> <a class="delete-btn ms-2" onclick="del('cash', ${i})">×</a></div></div>`;
            });

            // Assets & Liabilities Fixed Tables
            db.ast.forEach((item, i) => {
                document.getElementById('listAsset').innerHTML += `<div class="d-flex justify-content-between border-bottom py-1 px-2"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('ast', ${i})">×</a></span></div>`;
            });
            db.lib.forEach((item, i) => {
                document.getElementById('listLiab').innerHTML += `<div class="d-flex justify-content-between border-bottom py-1 px-2 text-danger"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('lib', ${i})">×</a></span></div>`;
            });

            // Totals
            document.getElementById('paydayVal').textContent = `Rp ${(tI - tE).toLocaleString()}`;
            document.getElementById('totalCashDisplay').textContent = `Total: Rp ${tC.toLocaleString()}`;
            const prog = tE > 0 ? (pI / tE) * 100 : 0;
            document.getElementById('freedomBar').style.width = Math.min(prog, 100) + '%';
            document.getElementById('freedomPct').textContent = Math.round(prog) + '%';
        }
        render();
    </script>
</body>

</html>
