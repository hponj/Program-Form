<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Strategic Financial Statement - Cashflow Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --main-purple: #8e74a1;
            --bg-tan: #f4e4bc;
        }

        body {
            background-color: #d1c4a9;
            font-family: 'Courier New', Courier, monospace;
            color: #2d2d2d;
        }

        .statement-container {
            background-color: var(--bg-tan);
            border: 2px solid #5d4037;
            padding: 20px;
            box-shadow: 10px 10px 0px #5d4037;
        }

        .header-bar {
            background-color: var(--main-purple);
            color: white;
            padding: 5px 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .label-row {
            border-bottom: 1px solid #5d4037;
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .val-text {
            font-weight: bold;
        }

        .cash-display {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: right;
        }

        .progress-box {
            border: 2px solid var(--main-purple);
            height: 25px;
            background: white;
            position: relative;
        }

        .progress-fill {
            background: var(--main-purple);
            height: 100%;
            transition: 0.5s;
        }

        .delete-btn {
            color: #ccc;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
        }

        .delete-btn:hover {
            color: red;
        }

        input,
        select {
            background: transparent;
            border: 1px solid #bcaaa4;
            font-family: inherit;
        }
    </style>
</head>

<body class="container my-4">

    <div class="statement-container mx-auto" style="max-width: 900px;">

        <div class="row mb-4">
            <div class="col-md-7">
                <div class="header-bar mb-2">INCOME</div>
                <form id="incomeForm" class="row g-1 mb-2">
                    <div class="col-6"><input type="text" id="incDesc" class="form-control form-control-sm"
                            placeholder="Sumber (Gaji/Dividen)"></div>
                    <div class="col-3"><input type="number" id="incVal" class="form-control form-control-sm"
                            placeholder="Rp"></div>
                    <div class="col-3"><button type="submit" class="btn btn-sm btn-dark w-100">Add</button></div>
                </form>
                <div id="incomeList"></div>

                <div class="header-bar mt-4 mb-2">EXPENSES</div>
                <form id="expForm" class="row g-1 mb-2">
                    <div class="col-6"><input type="text" id="expDesc" class="form-control form-control-sm"
                            placeholder="Biaya (Pajak/Makan)"></div>
                    <div class="col-3"><input type="number" id="expVal" class="form-control form-control-sm"
                            placeholder="Rp"></div>
                    <div class="col-3"><button type="submit" class="btn btn-sm btn-dark w-100">Add</button></div>
                </form>
                <div id="expenseList"></div>
            </div>

            <div class="col-md-5 text-end">
                <p class="mb-0 fw-bold small">INCREASE PASSIVE INCOME TO ESCAPE THE RAT RACE</p>
                <div class="progress-box my-2">
                    <div id="freedomBar" class="progress-fill" style="width: 0%"></div>
                </div>

                <div class="mt-4">
                    <span class="d-block small fw-bold">CASH ON HAND:</span>
                    <div class="cash-display" id="totalCash">Rp 0</div>
                </div>

                <div class="mt-4 text-start border-top border-dark pt-2">
                    <div class="d-flex justify-content-between"><span>TOTAL INCOME:</span> <span id="sumInc"
                            class="fw-bold">Rp 0</span></div>
                    <div class="d-flex justify-content-between"><span>TOTAL EXPENSES:</span> <span id="sumExp"
                            class="fw-bold text-danger">Rp 0</span></div>
                    <div class="d-flex justify-content-between border-top border-dark mt-1 pt-1 h5">
                        <span class="fw-bold">PAYDAY:</span>
                        <span id="paydayVal" class="fw-bold">Rp 0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="header-bar mb-2">ASSETS</div>
                <form id="assetForm" class="row g-1 mb-2">
                    <div class="col-6"><input type="text" id="astDesc" class="form-control form-control-sm"
                            placeholder="Saham/Bisnis"></div>
                    <div class="col-3"><input type="number" id="astVal" class="form-control form-control-sm"
                            placeholder="Cost"></div>
                    <div class="col-3"><button type="submit" class="btn btn-sm btn-dark w-100">+</button></div>
                </form>
                <div id="assetList"></div>
            </div>
            <div class="col-md-6">
                <div class="header-bar mb-2">LIABILITIES</div>
                <form id="liabForm" class="row g-1 mb-2">
                    <div class="col-6"><input type="text" id="libDesc" class="form-control form-control-sm"
                            placeholder="Hutang Bank/Kartu"></div>
                    <div class="col-3"><input type="number" id="libVal" class="form-control form-control-sm"
                            placeholder="Rp"></div>
                    <div class="col-3"><button type="submit" class="btn btn-sm btn-dark w-100">+</button></div>
                </form>
                <div id="liabList"></div>
            </div>
        </div>

    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cashflow_db')) || {
            cash: 0, inc: [], exp: [], ast: [], lib: []
        };

        function saveData() { localStorage.setItem('cashflow_db', JSON.stringify(db)); render(); }

        // Form Submissions
        document.getElementById('incomeForm').onsubmit = (e) => {
            e.preventDefault();
            db.inc.push({ d: document.getElementById('incDesc').value, v: parseFloat(document.getElementById('incVal').value) });
            saveData(); e.target.reset();
        };
        document.getElementById('expForm').onsubmit = (e) => {
            e.preventDefault();
            db.exp.push({ d: document.getElementById('expDesc').value, v: parseFloat(document.getElementById('expVal').value) });
            saveData(); e.target.reset();
        };
        document.getElementById('assetForm').onsubmit = (e) => {
            e.preventDefault();
            db.ast.push({ d: document.getElementById('astDesc').value, v: parseFloat(document.getElementById('astVal').value) });
            saveData(); e.target.reset();
        };
        document.getElementById('liabForm').onsubmit = (e) => {
            e.preventDefault();
            db.lib.push({ d: document.getElementById('libDesc').value, v: parseFloat(document.getElementById('libVal').value) });
            saveData(); e.target.reset();
        };

        function deleteItem(type, index) { db[type].splice(index, 1); saveData(); }

        function render() {
            let totalInc = 0; let totalExp = 0;

            // Lists
            const drawList = (id, data, type) => {
                const el = document.getElementById(id); el.innerHTML = '';
                data.forEach((item, i) => {
                    if (type === 'inc' || type === 'exp') { if (type === 'inc') totalInc += item.v; else totalExp += item.v; }
                    el.innerHTML += `<div class="label-row"><span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="deleteItem('${type}', ${i})">×</a></span></div>`;
                });
            };

            drawList('incomeList', db.inc, 'inc');
            drawList('expenseList', db.exp, 'exp');
            drawList('assetList', db.ast, 'ast');
            drawList('liabList', db.lib, 'lib');

            const payday = totalInc - totalExp;
            document.getElementById('sumInc').textContent = `Rp ${totalInc.toLocaleString()}`;
            document.getElementById('sumExp').textContent = `Rp -${totalExp.toLocaleString()}`;
            document.getElementById('paydayVal').textContent = `Rp ${payday.toLocaleString()}`;
            document.getElementById('paydayVal').style.color = payday >= 0 ? 'green' : 'red';

            // Total Cash (Saldo Aktif)
            document.getElementById('totalCash').textContent = `Rp ${db.cash.toLocaleString()}`;

            // Freedom Bar (Assumption: Passive Income is anything that's not "Gaji")
            let passive = db.inc.filter(i => !i.d.toLowerCase().includes('gaji')).reduce((s, c) => s + c.v, 0);
            let progress = totalExp > 0 ? (passive / totalExp) * 100 : 0;
            document.getElementById('freedomBar').style.width = Math.min(progress, 100) + '%';
        }

        render();
    </script>
</body>

</html>
