<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Strategic Financial Statement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            color: #334155;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .subtotal {
            font-size: 0.9rem;
            font-weight: bold;
            color: #0f172a;
        }

        .delete-btn {
            color: #cbd5e1;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .payday-box {
            background-color: #f1f5f9;
            border-radius: 8px;
            padding: 15px;
        }
    </style>
</head>

<body class="container my-5">

    <h2 class="fw-bold mb-4 text-center">FINANCIAL STATEMENT</h2>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card mb-4">
                <div class="card-header bg-dark text-white fw-bold">INCOME REPORT</div>
                <div class="card-body">
                    <form id="incomeForm" class="row g-2 mb-4">
                        <div class="col-md-5"><input type="text" id="incDesc" class="form-control form-control-sm"
                                placeholder="Keterangan" required></div>
                        <div class="col-md-3">
                            <select id="incCat" class="form-select form-select-sm">
                                <option value="active">Active (Gaji)</option>
                                <option value="dividend">Interest/Dividend</option>
                                <option value="business">Real Estate/Business</option>
                            </select>
                        </div>
                        <div class="col-md-2"><input type="number" id="incVal" class="form-control form-control-sm"
                                placeholder="Rp" required></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-dark btn-sm w-100">Add</button></div>
                    </form>

                    <div class="category-title">Active Income</div>
                    <div id="listActive"></div>
                    <div class="text-end subtotal mt-1">Sub-Total: <span id="subActive">Rp 0</span></div>

                    <div class="category-title">Interest / Dividends</div>
                    <div id="listDividend"></div>
                    <div class="text-end subtotal mt-1">Sub-Total: <span id="subDividend">Rp 0</span></div>

                    <div class="category-title">Real Estate / Business</div>
                    <div id="listBusiness"></div>
                    <div class="text-end subtotal mt-1">Sub-Total: <span id="subBusiness">Rp 0</span></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-secondary text-white fw-bold">EXPENSES</div>
                <div class="card-body">
                    <form id="expForm" class="row g-2 mb-3">
                        <div class="col-md-7"><input type="text" id="expDesc" class="form-control form-control-sm"
                                placeholder="Jenis Pengeluaran" required></div>
                        <div class="col-md-3"><input type="number" id="expVal" class="form-control form-control-sm"
                                placeholder="Rp" required></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-outline-dark btn-sm w-100">+</button>
                        </div>
                    </form>
                    <div id="listExpense"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card mb-4 payday-box">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold">TOTAL INCOME:</span>
                    <span id="totalInc" class="fw-bold">Rp 0</span>
                </div>
                <div class="d-flex justify-content-between align-items-center text-danger">
                    <span class="fw-bold">TOTAL EXPENSES:</span>
                    <span id="totalExp" class="fw-bold">Rp 0</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between align-items-center h4 mb-0">
                    <span class="fw-bold">PAYDAY:</span>
                    <span id="paydayVal" class="fw-bold text-primary">Rp 0</span>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-white fw-bold">ASSETS (Cost)</div>
                <div class="card-body">
                    <form id="assetForm" class="row g-1 mb-3">
                        <div class="col-7"><input type="text" id="astDesc" class="form-control form-control-sm"
                                placeholder="Aset"></div>
                        <div class="col-3"><input type="number" id="astVal" class="form-control form-control-sm"
                                placeholder="Rp"></div>
                        <div class="col-2"><button type="submit" class="btn btn-sm btn-dark w-100">+</button></div>
                    </form>
                    <div id="listAsset"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-white fw-bold text-danger">LIABILITIES</div>
                <div class="card-body">
                    <form id="liabForm" class="row g-1 mb-3">
                        <div class="col-7"><input type="text" id="libDesc" class="form-control form-control-sm"
                                placeholder="Liabilitas"></div>
                        <div class="col-3"><input type="number" id="libVal" class="form-control form-control-sm"
                                placeholder="Rp"></div>
                        <div class="col-2"><button type="submit" class="btn btn-sm btn-danger w-100">+</button></div>
                    </form>
                    <div id="listLiab"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fin_v2')) || { inc: [], exp: [], ast: [], lib: [] };

        function save() { localStorage.setItem('fin_v2', JSON.stringify(db)); render(); }

        document.getElementById('incomeForm').onsubmit = (e) => {
            e.preventDefault();
            db.inc.push({ d: document.getElementById('incDesc').value, c: document.getElementById('incCat').value, v: parseFloat(document.getElementById('incVal').value) });
            save(); e.target.reset();
        };

        document.getElementById('expForm').onsubmit = (e) => {
            e.preventDefault();
            db.exp.push({ d: document.getElementById('expDesc').value, v: parseFloat(document.getElementById('expVal').value) });
            save(); e.target.reset();
        };

        document.getElementById('assetForm').onsubmit = (e) => {
            e.preventDefault();
            db.ast.push({ d: document.getElementById('astDesc').value, v: parseFloat(document.getElementById('astVal').value) });
            save(); e.target.reset();
        };

        document.getElementById('liabForm').onsubmit = (e) => {
            e.preventDefault();
            db.lib.push({ d: document.getElementById('libDesc').value, v: parseFloat(document.getElementById('libVal').value) });
            save(); e.target.reset();
        };

        function del(type, i) { db[type].splice(i, 1); save(); }

        function render() {
            let tInc = 0, tExp = 0, sAct = 0, sDiv = 0, sBus = 0;

            const lists = { active: 'listActive', dividend: 'listDividend', business: 'listBusiness' };
            Object.values(lists).forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('listExpense').innerHTML = '';
            document.getElementById('listAsset').innerHTML = '';
            document.getElementById('listLiab').innerHTML = '';

            db.inc.forEach((item, i) => {
                tInc += item.v;
                if (item.c === 'active') sAct += item.v;
                else if (item.c === 'dividend') sDiv += item.v;
                else sBus += item.v;

                document.getElementById(lists[item.c]).innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1">
            <span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('inc', ${i})">×</a></span>
        </div>`;
            });

            db.exp.forEach((item, i) => {
                tExp += item.v;
                document.getElementById('listExpense').innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1">
            <span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('exp', ${i})">×</a></span>
        </div>`;
            });

            db.ast.forEach((item, i) => {
                document.getElementById('listAsset').innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1">
            <span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('ast', ${i})">×</a></span>
        </div>`;
            });

            db.lib.forEach((item, i) => {
                document.getElementById('listLiab').innerHTML += `<div class="d-flex justify-content-between small border-bottom py-1 text-danger">
            <span>${item.d}</span><span>Rp ${item.v.toLocaleString()} <a class="delete-btn" onclick="del('lib', ${i})">×</a></span>
        </div>`;
            });

            document.getElementById('subActive').textContent = `Rp ${sAct.toLocaleString()}`;
            document.getElementById('subDividend').textContent = `Rp ${sDiv.toLocaleString()}`;
            document.getElementById('subBusiness').textContent = `Rp ${sBus.toLocaleString()}`;
            document.getElementById('totalInc').textContent = `Rp ${tInc.toLocaleString()}`;
            document.getElementById('totalExp').textContent = `Rp ${tExp.toLocaleString()}`;
            document.getElementById('paydayVal').textContent = `Rp ${(tInc - tExp).toLocaleString()}`;
        }

        render();
    </script>
</body>

</html>
