<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wealth Dashboard - Cashflow Game Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-gold: #f1c40f;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            margin-bottom: 1.5rem;
        }

        .card-header {
            border-bottom: 1px solid #333;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table {
            color: var(--text-main);
            border-color: #333;
        }

        .form-control,
        .form-select {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
        }

        .form-control:focus {
            background-color: #333;
            color: white;
            border-color: var(--accent-blue);
        }

        .delete-btn {
            color: var(--accent-red);
            cursor: pointer;
            border: none;
            background: none;
        }

        .nav-btn {
            background: #333;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
        }

        .nav-btn:hover {
            background: #444;
        }

        /* Split Column Styling */
        .split-col {
            border-right: 1px solid #333;
        }

        @media (max-width: 768px) {
            .split-col {
                border-right: none;
                border-bottom: 1px solid #333;
            }
        }

        .summary-box {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }

        .bg-pos {
            background: rgba(46, 204, 113, 0.1);
            color: var(--accent-green);
        }

        .bg-neg {
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent-red);
        }
    </style>
</head>

<body class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0" style="color: var(--accent-gold)">WEALTH DASHBOARD</h2>
        <div class="text-end">
            <button id="prevMonth" class="nav-btn">‹</button>
            <span id="monthTitle" class="mx-3 fw-bold"></span>
            <button id="nextMonth" class="nav-btn">›</button>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header text-center py-3">Balance Sheet (Posisi Kekayaan)</div>
        <div class="card-body p-0">
            <div class="row g-0">
                <div class="col-md-6 split-col p-4">
                    <h5 class="text-success mb-3">ASSETS</h5>
                    <form id="assetForm" class="row g-2 mb-3">
                        <div class="col-7"><input type="text" id="assetName" class="form-control form-control-sm"
                                placeholder="Aset (Bisnis, Properti, dll)"></div>
                        <div class="col-5"><input type="number" id="assetValue" class="form-control form-control-sm"
                                placeholder="Nilai"></div>
                        <div class="col-12"><button type="submit" class="btn btn-sm btn-outline-success w-100">+ Tambah
                                Aset</button></div>
                    </form>
                    <table class="table table-sm">
                        <tbody id="assetTableBody"></tbody>
                    </table>
                    <div class="summary-box bg-pos mt-3">Total Aset: <span id="totalAssetLabel">0</span></div>
                </div>
                <div class="col-md-6 p-4">
                    <h5 class="text-danger mb-3">LIABILITIES</h5>
                    <form id="liabForm" class="row g-2 mb-3">
                        <div class="col-7"><input type="text" id="liabName" class="form-control form-control-sm"
                                placeholder="Beban (Hutang, Cicilan)"></div>
                        <div class="col-5"><input type="number" id="liabValue" class="form-control form-control-sm"
                                placeholder="Nilai"></div>
                        <div class="col-12"><button type="submit" class="btn btn-sm btn-outline-danger w-100">+ Tambah
                                Liabilitas</button></div>
                    </form>
                    <table class="table table-sm">
                        <tbody id="liabTableBody"></tbody>
                    </table>
                    <div class="summary-box bg-neg mt-3">Total Liabilitas: <span id="totalLiabLabel">0</span></div>
                </div>
            </div>
            <div class="p-3 text-center border-top">
                <h4 class="m-0">NET WORTH: <span id="netWorthDisplay" class="text-info">Rp 0</span></h4>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header text-center py-3">Cash Flow (Arus Kas Bulanan)</div>
        <div class="card-body p-0">
            <div class="row g-0">
                <div class="col-md-6 split-col p-4">
                    <h5 class="text-success mb-3">INCOME</h5>
                    <form id="incForm" class="row g-2 mb-3">
                        <div class="col-7"><input type="text" id="incName" class="form-control form-control-sm"
                                placeholder="Pemasukan"></div>
                        <div class="col-5"><input type="number" id="incValue" class="form-control form-control-sm"
                                placeholder="Nominal"></div>
                        <div class="col-12"><button type="submit" class="btn btn-sm btn-success w-100">Catat
                                Masuk</button></div>
                    </form>
                    <table class="table table-sm">
                        <tbody id="incTableBody"></tbody>
                    </table>
                </div>
                <div class="col-md-6 p-4">
                    <h5 class="text-danger mb-3">EXPENSES</h5>
                    <form id="expForm" class="row g-2 mb-3">
                        <div class="col-7"><input type="text" id="expName" class="form-control form-control-sm"
                                placeholder="Pengeluaran"></div>
                        <div class="col-5"><input type="number" id="expValue" class="form-control form-control-sm"
                                placeholder="Nominal"></div>
                        <div class="col-12"><button type="submit" class="btn btn-sm btn-danger w-100">Catat
                                Keluar</button></div>
                    </form>
                    <table class="table table-sm">
                        <tbody id="expTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="p-3 bg-dark text-center border-top">
                <span class="text-muted">Monthly Surplus/Deficit:</span>
                <h3 id="netCashFlowDisplay" class="m-0">Rp 0</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header">Liquid Cash & Stocks</div>
                <div class="card-body">
                    <div id="liquidDisplay" class="mb-3 p-2 bg-pos rounded text-center fw-bold"></div>
                    <div id="stockListDisplay"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header d-flex justify-content-between">
                    <span>Checklist</span>
                    <button id="resetChecklist" class="badge bg-danger border-0">Reset</button>
                </div>
                <div class="card-body p-2">
                    <div class="table-responsive" style="font-size: 0.8rem;">
                        <table class="table table-bordered text-center m-0">
                            <tbody id="checkBulanBodyCSP"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let data = {
            assets: JSON.parse(localStorage.getItem('assets')) || [],
            liabilities: JSON.parse(localStorage.getItem('liabilities')) || [],
            cashflows: JSON.parse(localStorage.getItem('cashflows')) || {},
            finances: JSON.parse(localStorage.getItem('finances')) || [],
            stocks: JSON.parse(localStorage.getItem('stocks')) || []
        };
        let currentDate = new Date();

        // Helper: Save
        const save = () => { Object.keys(data).forEach(key => localStorage.setItem(key, JSON.stringify(data[key]))); };

        // === BALANCE SHEET LOGIC ===
        const updateBalanceSheet = () => {
            const aBody = document.getElementById('assetTableBody');
            const lBody = document.getElementById('liabTableBody');
            let tA = 0, tL = 0;

            aBody.innerHTML = '';
            data.assets.forEach((item, i) => {
                tA += item.val;
                aBody.innerHTML += `<tr><td>${item.name}</td><td class="text-end">Rp ${item.val.toLocaleString()}</td><td><button class="delete-btn" onclick="deleteItem('assets', ${i})">×</button></td></tr>`;
            });

            lBody.innerHTML = '';
            data.liabilities.forEach((item, i) => {
                tL += item.val;
                lBody.innerHTML += `<tr><td>${item.name}</td><td class="text-end">Rp ${item.val.toLocaleString()}</td><td><button class="delete-btn" onclick="deleteItem('liabilities', ${i})">×</button></td></tr>`;
            });

            document.getElementById('totalAssetLabel').innerText = `Rp ${tA.toLocaleString()}`;
            document.getElementById('totalLiabLabel').innerText = `Rp ${tL.toLocaleString()}`;
            document.getElementById('netWorthDisplay').innerText = `Rp ${(tA - tL).toLocaleString()}`;
            save();
        };

        // === CASH FLOW LOGIC ===
        const updateCashFlow = () => {
            const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`;
            const cf = data.cashflows[monthKey] || [];
            const iBody = document.getElementById('incTableBody');
            const eBody = document.getElementById('expTableBody');
            let tI = 0, tE = 0;

            iBody.innerHTML = ''; eBody.innerHTML = '';
            cf.forEach((item, i) => {
                if (item.type === 'in') {
                    tI += item.val;
                    iBody.innerHTML += `<tr><td>${item.name}</td><td class="text-end text-success">+${item.val.toLocaleString()}</td><td><button class="delete-btn" onclick="deleteCF(${i})">×</button></td></tr>`;
                } else {
                    tE += item.val;
                    eBody.innerHTML += `<tr><td>${item.name}</td><td class="text-end text-danger">-${item.val.toLocaleString()}</td><td><button class="delete-btn" onclick="deleteCF(${i})">×</button></td></tr>`;
                }
            });

            const net = tI - tE;
            const display = document.getElementById('netCashFlowDisplay');
            display.innerText = `Rp ${net.toLocaleString()}`;
            display.className = net >= 0 ? 'm-0 text-success' : 'm-0 text-danger';
            save();
        };

        // Form Event Listeners
        document.getElementById('assetForm').onsubmit = (e) => { e.preventDefault(); data.assets.push({ name: document.getElementById('assetName').value, val: parseFloat(document.getElementById('assetValue').value) }); updateBalanceSheet(); e.target.reset(); };
        document.getElementById('liabForm').onsubmit = (e) => { e.preventDefault(); data.liabilities.push({ name: document.getElementById('liabName').value, val: parseFloat(document.getElementById('liabValue').value) }); updateBalanceSheet(); e.target.reset(); };

        document.getElementById('incForm').onsubmit = (e) => { addCF('in', 'incName', 'incValue'); e.target.reset(); };
        document.getElementById('expForm').onsubmit = (e) => { addCF('out', 'expName', 'expValue'); e.target.reset(); };

        function addCF(type, idN, idV) {
            const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`;
            if (!data.cashflows[monthKey]) data.cashflows[monthKey] = [];
            data.cashflows[monthKey].push({ type, name: document.getElementById(idN).value, val: parseFloat(document.getElementById(idV).value) });
            updateCashFlow();
        }

        window.deleteItem = (cat, i) => { data[cat].splice(i, 1); updateBalanceSheet(); };
        window.deleteCF = (i) => { const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`; data.cashflows[monthKey].splice(i, 1); updateCashFlow(); };

        // === CHECKLIST & ORIGINAL SYNC ===
        function renderChecklist() {
            const tbody = document.getElementById('checkBulanBodyCSP');
            tbody.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthName = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            document.getElementById('monthTitle').innerText = monthName;

            let tr = document.createElement('tr');
            for (let day = 1; day <= daysInMonth; day++) {
                const td = document.createElement('td');
                const storageKey = `checklist-csp-${year}-${month + 1}`;
                let checks = JSON.parse(localStorage.getItem(storageKey)) || {};
                td.innerHTML = `${day}<br><input type="checkbox" onchange="toggleCheck(this, '${storageKey}', ${day})" ${checks[day] ? 'checked' : ''}>`;
                tr.appendChild(td);
                if (new Date(year, month, day).getDay() === 0 || day === daysInMonth) { tbody.appendChild(tr); tr = document.createElement('tr'); }
            }
        }

        window.toggleCheck = (cb, key, day) => { let d = JSON.parse(localStorage.getItem(key)) || {}; d[day] = cb.checked; localStorage.setItem(key, JSON.stringify(d)); };

        // Navigation
        document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); refreshAll(); };
        document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); refreshAll(); };

        function refreshAll() {
            updateBalanceSheet();
            updateCashFlow();
            renderChecklist();
            // Sync liquid cash total
            let liquid = data.finances.reduce((a, b) => a + b.saldo, 0);
            document.getElementById('liquidDisplay').innerText = `CASH ON HAND: Rp ${liquid.toLocaleString()}`;
        }

        refreshAll();
    </script>
</body>

</html>
