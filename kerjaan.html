<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Business Ops - Execution Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --csp-color: #0d6efd;
            --dmi-color: #198754;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .check-table td {
            width: 14.2%;
            height: 70px;
            vertical-align: middle;
            border: 1px solid #f1f5f9;
            transition: 0.3s;
        }

        .check-table td:hover {
            background-color: #f8fafc;
        }

        .day-num {
            font-size: 0.75rem;
            font-weight: bold;
            color: #94a3b8;
            display: block;
            margin-bottom: 5px;
        }

        .form-check-input {
            transform: scale(1.3);
            cursor: pointer;
        }

        .stats-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
        }

        .nav-btn {
            border-radius: 10px;
            padding: 5px 15px;
        }

        .business-label {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">BUSINESS OPERATIONS</h2>
        <div class="d-flex gap-2">
            <button id="prevMonth" class="btn btn-outline-dark nav-btn">‹</button>
            <span id="monthDisplay" class="btn btn-dark nav-btn fw-bold">Mei 2026</span>
            <button id="nextMonth" class="btn btn-outline-dark nav-btn">›</button>
        </div>
    </div>

    <div class="card stats-card mb-4">
        <div class="card-body d-flex justify-content-around align-items-center py-4 text-center">
            <div>
                <small class="opacity-75">Work Consistency</small>
                <h2 id="totalChecks" class="fw-bold m-0">0</h2>
                <small>Days Completed</small>
            </div>
            <div class="vr opacity-25"></div>
            <div>
                <small class="opacity-75">Productivity Status</small>
                <h2 id="workStatus" class="fw-bold m-0 text-warning">IDLE</h2>
                <small id="efficiencyPct">0% Efficiency</small>
            </div>
        </div>
    </div>

    <div class="card mb-4 border-start border-primary border-5">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="business-label text-primary">Cahaya Sakti Pratama</span>
                <button onclick="resetCheck('csp')" class="btn btn-sm btn-outline-secondary">Reset Month</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle check-table">
                    <thead class="table-light">
                        <tr>
                            <th>Sen</th>
                            <th>Sel</th>
                            <th>Rab</th>
                            <th>Kam</th>
                            <th>Jum</th>
                            <th>Sab</th>
                            <th>Min</th>
                        </tr>
                    </thead>
                    <tbody id="bodyCSP"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mb-4 border-start border-success border-5">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="business-label text-success">Dhimasmitrainternational</span>
                <button onclick="resetCheck('dmi')" class="btn btn-sm btn-outline-secondary">Reset Month</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle check-table">
                    <thead class="table-light">
                        <tr>
                            <th>Sen</th>
                            <th>Sel</th>
                            <th>Rab</th>
                            <th>Kam</th>
                            <th>Jum</th>
                            <th>Sab</th>
                            <th>Min</th>
                        </tr>
                    </thead>
                    <tbody id="bodyDMI"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            document.getElementById('monthDisplay').textContent = monthName;

            createTable('bodyCSP', 'check-csp');
            createTable('bodyDMI', 'check-dmi');
            calculateStats();
        }

        function createTable(tbodyId, storagePrefix) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const storageKey = `${storagePrefix}-${year}-${month + 1}`;
            let savedData = JSON.parse(localStorage.getItem(storageKey)) || {};

            let tr = document.createElement('tr');
            // Offset hari (Senin=1, ..., Minggu=0)
            let offset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < offset; i++) tr.appendChild(document.createElement('td'));

            for (let day = 1; day <= daysInMonth; day++) {
                const td = document.createElement('td');
                const isChecked = savedData[day] ? 'checked' : '';
                td.innerHTML = `
          <span class="day-num">${day}</span>
          <input type="checkbox" class="form-check-input" 
                 onclick="toggleDay('${storageKey}', ${day}, this.checked)" ${isChecked}>
        `;
                tr.appendChild(td);

                if ((offset + day) % 7 === 0) {
                    tbody.appendChild(tr);
                    tr = document.createElement('tr');
                }
            }
            if (tr.children.length > 0) tbody.appendChild(tr);
        }

        function toggleDay(key, day, val) {
            let data = JSON.parse(localStorage.getItem(key)) || {};
            data[day] = val;
            localStorage.setItem(key, JSON.stringify(data));
            calculateStats();
        }

        function calculateStats() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

            const cspData = JSON.parse(localStorage.getItem(`check-csp-${year}-${month}`)) || {};
            const dmiData = JSON.parse(localStorage.getItem(`check-dmi-${year}-${month}`)) || {};

            const countCSP = Object.values(cspData).filter(v => v).length;
            const countDMI = Object.values(dmiData).filter(v => v).length;
            const total = countCSP + countDMI;
            const maxPossible = daysInMonth * 2;
            const pct = Math.round((total / maxPossible) * 100) || 0;

            document.getElementById('totalChecks').textContent = total;
            document.getElementById('efficiencyPct').textContent = `${pct}% Efficiency`;

            let status = "IDLE";
            let color = "#ffc107";
            if (pct > 80) { status = "ELITE"; color = "#10b981"; }
            else if (pct > 50) { status = "ACTIVE"; color = "#3b82f6"; }

            const statusEl = document.getElementById('workStatus');
            statusEl.textContent = status;
            statusEl.style.color = color;
        }

        function resetCheck(prefix) {
            if (confirm('Hapus semua laporan kerja bulan ini?')) {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth() + 1;
                localStorage.removeItem(`check-${prefix}-${year}-${month}`);
                renderCalendar();
            }
        }

        document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };

        renderCalendar();
    </script>
</body>

</html>
