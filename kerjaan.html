<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Business Task & Billing Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --csp-color: #0d6efd;
            --dmi-color: #198754;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
        }

        .card {
            border: none;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            font-weight: 700;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .check-table td {
            width: 14.2%;
            height: 85px;
            vertical-align: middle;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .check-table td:hover {
            background-color: #f1f5f9;
        }

        .check-day {
            transform: scale(1.3);
            cursor: pointer;
        }

        .billing-badge {
            font-size: 1rem;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .day-num {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>

<body class="container my-4">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Business Ops & Billing</h2>
        <div class="d-flex justify-content-center align-items-center gap-3 mt-3">
            <button id="prevMonth" class="btn btn-sm btn-dark">‹ Prev</button>
            <span id="monthTitle" class="fw-bold h5 m-0" style="min-width: 150px;"></span>
            <button id="nextMonth" class="btn btn-sm btn-dark">Next ›</button>
        </div>
    </div>

    <div class="card shadow-sm border-start border-primary border-5">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <span class="text-primary fw-bold">CAHAYA SAKTI PRATAMA</span>
            <span id="totalCSP" class="badge bg-primary billing-badge">Tagihan: Rp 0</span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle check-table">
                    <thead class="table-light">
                        <tr>
                            <th>Sen</th>
                            <th>Sel</th>
                            <th>Rab</th>
                            <th>Kam</th>
                            <th>Jum</th>
                            <th>Sab</th>
                            <th>Min</th>
                        </tr>
                    </thead>
                    <tbody id="checkBulanBodyCSP"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-start border-success border-5">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <span class="text-success fw-bold">DHIMASMITRAINTERNATIONAL</span>
            <span id="totalDMI" class="badge bg-success billing-badge">Tagihan: Rp 0</span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle check-table">
                    <thead class="table-light">
                        <tr>
                            <th>Sen</th>
                            <th>Sel</th>
                            <th>Rab</th>
                            <th>Kam</th>
                            <th>Jum</th>
                            <th>Sab</th>
                            <th>Min</th>
                        </tr>
                    </thead>
                    <tbody id="checkBulanBodyDMI"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center mt-3">
        <button id="resetChecklist" class="btn btn-outline-danger btn-sm">Reset Semua Data Bulan Ini</button>
    </div>

    <script>
        let currentDate = new Date();
        const RATE_PER_TASK = 10000;

        function createChecklistTable(tbodyId, storagePrefix, totalDisplayId) {
            const tbody = document.getElementById(tbodyId); tbody.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const storageKey = `${storagePrefix}-${year}-${month + 1}`;

            let monthlyChecks = JSON.parse(localStorage.getItem(storageKey)) || {};
            let tr = document.createElement('tr');

            // Hitung total awal
            updateBillingDisplay(storageKey, totalDisplayId);

            // Offset hari (Monday start)
            let offset = (firstDay === 0 ? 6 : firstDay - 1);
            for (let i = 0; i < offset; i++) tr.appendChild(document.createElement('td'));

            for (let day = 1; day <= daysInMonth; day++) {
                const td = document.createElement('td');
                const checked = monthlyChecks[day] ? 'checked' : '';
                td.innerHTML = `
            <div class="day-num">${day}</div>
            <input type="checkbox" class="form-check-input check-day" 
                   data-day="${day}" data-storage="${storageKey}" 
                   data-display="${totalDisplayId}" ${checked}>
        `;
                tr.appendChild(td);
                if ((offset + day) % 7 === 0) {
                    tbody.appendChild(tr);
                    tr = document.createElement('tr');
                }
            }
            if (tr.children.length > 0) tbody.appendChild(tr);

            // Attach event listener
            tbody.querySelectorAll('.check-day').forEach(cb => {
                cb.onchange = () => {
                    let data = JSON.parse(localStorage.getItem(cb.dataset.storage)) || {};
                    data[cb.dataset.day] = cb.checked;
                    localStorage.setItem(cb.dataset.storage, JSON.stringify(data));
                    updateBillingDisplay(cb.dataset.storage, cb.dataset.display);
                };
            });
        }

        function updateBillingDisplay(storageKey, displayId) {
            const data = JSON.parse(localStorage.getItem(storageKey)) || {};
            const count = Object.values(data).filter(val => val === true).length;
            const total = count * RATE_PER_TASK;
            document.getElementById(displayId).textContent = `Tagihan: Rp ${total.toLocaleString('id-ID')}`;
        }

        function renderPage() {
            document.getElementById('monthTitle').textContent = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            createChecklistTable('checkBulanBodyCSP', 'checklist-csp', 'totalCSP');
            createChecklistTable('checkBulanBodyDMI', 'checklist-dmi', 'totalDMI');
        }

        document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderPage(); };
        document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderPage(); };

        document.getElementById('resetChecklist').onclick = () => {
            if (confirm('Yakin ingin mereset checklist bulan ini?')) {
                const m = currentDate.getMonth() + 1;
                const y = currentDate.getFullYear();
                localStorage.removeItem(`checklist-csp-${y}-${m}`);
                localStorage.removeItem(`checklist-dmi-${y}-${m}`);
                renderPage();
            }
        };

        renderPage();
    </script>
</body>

</html>
