<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cashflow Game Style Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --income-bg: #f0fdf4;
      --income-text: #166534;
      --expense-bg: #fef2f2;
      --expense-text: #991b1b;
      --asset-bg: #eff6ff;
      --asset-text: #1e40af;
      --liability-bg: #fff7ed;
      --liability-text: #9a3412;
    }

    body {
      background-color: #f8fafc;
      color: #334155;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
    }

    .delete-btn:hover {
      color: #dc3545;
    }

    .check-table td {
      width: 14.2%;
      height: 80px;
      vertical-align: middle;
      border: 1px solid #e2e8f0;
    }

    .check-table input[type="checkbox"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    .card {
      border: none;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .card-header {
      font-weight: 700;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* Cashflow Game Style Layout */
    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      font-weight: 800;
    }

    .half-col {
      border-radius: 8px;
      padding: 15px;
      height: 100%;
    }

    .bg-income {
      background-color: var(--income-bg);
      color: var(--income-text);
    }

    .bg-expense {
      background-color: var(--expense-bg);
      color: var(--expense-text);
    }

    .bg-asset {
      background-color: var(--asset-bg);
      color: var(--asset-text);
    }

    .bg-liability {
      background-color: var(--liability-bg);
      color: var(--liability-text);
    }

    .total-display {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .input-adjust {
      width: 80px !important;
    }
  </style>
</head>

<body class="container my-4">

  <h2 class="mb-4 fw-bold text-center">Simple it data</h2>


  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
      <div><button id="prevMonth" class="btn btn-sm btn-light">‹</button> <button id="nextMonth"
          class="btn btn-sm btn-light">›</button></div>
      <span id="monthTitle" class="fw-bold"></span>
      <button id="resetChecklist" class="btn btn-sm btn-outline-light text-white">Reset</button>
    </div>
    <div class="card-body">
      <h3 class="monthly-check-title text-primary">Cahaya Sakti Pratama:</h3>
      <div class="table-responsive mb-4">
        <table class="table table-bordered text-center align-middle check-table">
          <thead class="table-light">
            <tr>
              <th>Sen</th>
              <th>Sel</th>
              <th>Rab</th>
              <th>Kam</th>
              <th>Jum</th>
              <th>Sab</th>
              <th>Min</th>
            </tr>
          </thead>
          <tbody id="checkBulanBodyCSP"></tbody>
        </table>
      </div>
      <h3 class="monthly-check-title text-success">Dhimasmitrainternational:</h3>
      <div class="table-responsive">
        <table class="table table-bordered text-center align-middle check-table">
          <thead class="table-light">
            <tr>
              <th>Sen</th>
              <th>Sel</th>
              <th>Rab</th>
              <th>Kam</th>
              <th>Jum</th>
              <th>Sab</th>
              <th>Min</th>
            </tr>
          </thead>
          <tbody id="checkBulanBodyDMI"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let finances = JSON.parse(localStorage.getItem('finances')) || [];
    let stocks = JSON.parse(localStorage.getItem('stocks')) || [];
    let assets = JSON.parse(localStorage.getItem('assets')) || [];
    let cashflows = JSON.parse(localStorage.getItem('cashflows')) || {};
    let currentDate = new Date();

    // === BALANCESHEET LOGIC ===
    document.getElementById('assetForm').onsubmit = function (e) {
      e.preventDefault();
      assets.push({ nama: document.getElementById('namaItem').value, tipe: document.getElementById('tipeItem').value, nilai: parseFloat(document.getElementById('nilaiItem').value) });
      updateAssets();
      this.reset();
    };

    function updateAssets() {
      localStorage.setItem('assets', JSON.stringify(assets));
      const aBody = document.getElementById('assetTableBody');
      const lBody = document.getElementById('liabilityTableBody');
      aBody.innerHTML = ''; lBody.innerHTML = '';
      let netWorth = 0;

      assets.forEach((item, index) => {
        const isAsset = item.tipe === 'asset';
        netWorth += isAsset ? item.nilai : -item.nilai;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td style="font-size:0.85rem">${item.nama}</td><td class="text-end fw-bold" style="font-size:0.85rem">Rp ${item.nilai.toLocaleString('id-ID')}</td><td><button class="delete-btn" onclick="deleteAsset(${index})">×</button></td>`;
        if (isAsset) aBody.appendChild(tr); else lBody.appendChild(tr);
      });
      document.getElementById('netWorthDisplay').textContent = `Net Worth: Rp ${netWorth.toLocaleString('id-ID')}`;
    }
    window.deleteAsset = (index) => { assets.splice(index, 1); updateAssets(); };

    // === CASHFLOW LOGIC ===
    document.getElementById('cashFlowForm').onsubmit = function (e) {
      e.preventDefault();
      const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`;
      if (!cashflows[monthKey]) cashflows[monthKey] = [];
      cashflows[monthKey].push({ desc: document.getElementById('cfDesc').value, type: document.getElementById('cfType').value, amount: parseFloat(document.getElementById('cfAmount').value) });
      updateCashFlow();
      this.reset();
    };

    function updateCashFlow() {
      localStorage.setItem('cashflows', JSON.stringify(cashflows));
      const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`;
      const monthData = cashflows[monthKey] || [];
      const inBody = document.getElementById('incomeTableBody');
      const outBody = document.getElementById('expenseTableBody');
      inBody.innerHTML = ''; outBody.innerHTML = '';

      let totalIn = 0, totalOut = 0;
      monthData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td style="font-size:0.85rem">${item.desc}</td><td class="text-end fw-bold" style="font-size:0.85rem">Rp ${item.amount.toLocaleString('id-ID')}</td><td><button class="delete-btn" onclick="deleteCF(${index})">×</button></td>`;
        if (item.type === 'in') { totalIn += item.amount; inBody.appendChild(tr); }
        else { totalOut += item.amount; outBody.appendChild(tr); }
      });

      document.getElementById('cashFlowMonthTitle').textContent = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
      document.getElementById('totalIn').textContent = `Rp ${totalIn.toLocaleString('id-ID')}`;
      document.getElementById('totalOut').textContent = `Rp ${totalOut.toLocaleString('id-ID')}`;
      const net = totalIn - totalOut;
      document.getElementById('netCashFlow').textContent = `Rp ${net.toLocaleString('id-ID')}`;
      document.getElementById('netCashFlowBox').style.color = net >= 0 ? '#166534' : '#991b1b';
    }
    window.deleteCF = (index) => { const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`; cashflows[monthKey].splice(index, 1); updateCashFlow(); };

    // === FINANCE KAS LOGIC ===
    document.getElementById('financeForm').onsubmit = function (e) {
      e.preventDefault();
      finances.push({ nama: document.getElementById('namaPos').value, saldo: parseFloat(document.getElementById('nominalAwal').value) });
      updateFinance();
      this.reset();
    };
    function updateFinance() {
      localStorage.setItem('finances', JSON.stringify(finances));
      const tbody = document.getElementById('financeTableBody'); tbody.innerHTML = '';
      let total = 0;
      finances.forEach((item, index) => {
        total += item.saldo;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><strong>${item.nama}</strong></td><td>Rp ${item.saldo.toLocaleString('id-ID')}</td><td class="text-center"><div class="input-group input-group-sm justify-content-center"><input type="number" class="form-control input-adjust" id="adjFin-${index}"><button class="btn btn-outline-success" onclick="changeFinance(${index}, 1)">+</button><button class="btn btn-outline-danger" onclick="changeFinance(${index}, -1)">-</button></div></td><td class="text-center"><button class="delete-btn" onclick="deleteFinance(${index})">×</button></td>`;
        tbody.appendChild(tr);
      });
      document.getElementById('totalCashDisplay').textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
    }
    window.changeFinance = (index, sign) => { const input = document.getElementById(`adjFin-${index}`); const val = parseFloat(input.value); if (!isNaN(val)) { finances[index].saldo += (val * sign); updateFinance(); } };
    window.deleteFinance = (index) => { finances.splice(index, 1); updateFinance(); };

    // === STOCK LOGIC ===
    document.getElementById('stockForm').onsubmit = function (e) {
      e.preventDefault();
      stocks.push({ kode: document.getElementById('kodeSaham').value.toUpperCase(), lot: parseInt(document.getElementById('jumlahLot').value) });
      updateStocks();
      this.reset();
    };
    function updateStocks() {
      localStorage.setItem('stocks', JSON.stringify(stocks));
      const tbody = document.getElementById('stockTableBody'); tbody.innerHTML = '';
      stocks.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><strong>${item.kode}</strong></td><td>${item.lot} Lot</td><td class="text-center"><div class="input-group input-group-sm justify-content-center"><input type="number" class="form-control input-adjust" id="adjStock-${index}"><button class="btn btn-outline-success" onclick="changeStock(${index}, 1)">+</button><button class="btn btn-outline-danger" onclick="changeStock(${index}, -1)">-</button></div></td><td class="text-center"><button class="delete-btn" onclick="deleteStock(${index})">×</button></td>`;
        tbody.appendChild(tr);
      });
    }
    window.changeStock = (index, sign) => { const input = document.getElementById(`adjStock-${index}`); const val = parseInt(input.value); if (!isNaN(val)) { stocks[index].lot += (val * sign); updateStocks(); } };
    window.deleteStock = (index) => { stocks.splice(index, 1); updateStocks(); };

    // === CHECKLIST LOGIC ===
    function createChecklistTable(tbodyId, storagePrefix) {
      const tbody = document.getElementById(tbodyId); tbody.innerHTML = '';
      const year = currentDate.getFullYear(); const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
      const storageKey = `${storagePrefix}-${year}-${month + 1}`;
      let monthlyChecks = JSON.parse(localStorage.getItem(storageKey)) || {};
      let tr = document.createElement('tr');
      for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) tr.appendChild(document.createElement('td'));
      for (let day = 1; day <= daysInMonth; day++) {
        const td = document.createElement('td');
        td.innerHTML = `<div><div class="fw-bold">${day}</div><input type="checkbox" class="form-check-input check-day" data-day="${day}" data-storage="${storageKey}" ${monthlyChecks[day] ? 'checked' : ''}></div>`;
        tr.appendChild(td);
        if (new Date(year, month, day).getDay() === 0) { tbody.appendChild(tr); tr = document.createElement('tr'); }
      }
      if (tr.children.length > 0) tbody.appendChild(tr);
    }

    function renderPage() {
      document.getElementById('monthTitle').textContent = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
      createChecklistTable('checkBulanBodyCSP', 'checklist-csp');
      createChecklistTable('checkBulanBodyDMI', 'checklist-dmi');
      document.querySelectorAll('.check-day').forEach(cb => { cb.onchange = () => { let data = JSON.parse(localStorage.getItem(cb.dataset.storage)) || {}; data[cb.dataset.day] = cb.checked; localStorage.setItem(cb.dataset.storage, JSON.stringify(data)); }; });
      updateCashFlow();
    }

    document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderPage(); };
    document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderPage(); };
    document.getElementById('resetChecklist').onclick = () => { if (confirm('Reset?')) { localStorage.removeItem(`checklist-csp-${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`); localStorage.removeItem(`checklist-dmi-${currentDate.getFullYear()}-${currentDate.getMonth() + 1}`); renderPage(); } };

    // Init
    updateFinance(); updateStocks(); updateAssets(); renderPage();
  </script>
</body>

</html>
